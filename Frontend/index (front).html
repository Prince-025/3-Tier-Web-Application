<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Tier Web Application</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>3-Tier Web Application</h1>
        <p>Frontend + Backend + Database Demo</p>

        <!-- Messages Display -->
        <div class="message-container">
            <h2>Messages from Database</h2>
            <div id="message-box">Loading...</div>
        </div>

        <!-- Form Section -->
        <div class="form-container">
            <h2>Add New Message</h2>

            <form id="message-form">
                <div class="form-group">
                    <label for="message">Message:</label>
                    <input type="text" id="message" name="message" required>
                </div>

                <button type="submit">Save Message</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            fetchMessages();

            const form = document.getElementById('message-form');

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                const message = document.getElementById('message').value;

                fetch('api/save_message.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'message=' + encodeURIComponent(message)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('message').value = '';
                        fetchMessages();
                    } else {
                        alert('Error: ' + data.error);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to save message');
                });
            });
        });

        function fetchMessages() {
            const messageBox = document.getElementById('message-box');
            messageBox.textContent = 'Loading...';

            fetch('api/get_messages.php')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {

                        if (data.messages.length === 0) {
                            messageBox.innerHTML = '<p>No messages found</p>';
                        } else {
                            let html = '<ul>';

                            data.messages.forEach(msg => {
                                // Basic XSS protection
                                const safeMessage = msg.message
                                    .replace(/</g, "&lt;")
                                    .replace(/>/g, "&gt;");

                                html += `
                                    <li>
                                        ${safeMessage}
                                        <span style="color:gray;font-size:12px;">
                                            (${msg.created_at})
                                        </span>
                                    </li>
                                `;
                            });

                            html += '</ul>';
                            messageBox.innerHTML = html;
                        }

                    } else {
                        messageBox.innerHTML = '<p>Error: ' + data.error + '</p>';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    messageBox.innerHTML = '<p>Failed to load messages</p>';
                });
        }
    </script>
</body>
</html>
