version: "3.8"

services:

  # 🖥️ FRONTEND (Nginx)
  frontend:
    image: nginx:alpine
    container_name: frontend_container
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend

  # ⚙️ BACKEND (PHP + Apache)
  backend:
    image: php:8.2-apache
    container_name: backend_container
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: hello_world
      DB_USER: root
      DB_PASS: root
    depends_on:
      - db
    command: >
      bash -c "docker-php-ext-install pdo pdo_mysql &&
               apache2-foreground"

  # 🗄️ DATABASE (MySQL)
  db:
    image: mysql:8
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hello_world
    ports:
      - "3306:3306"
    volumes:
      - ./database/database_setup.sql:/docker-entrypoint-initdb.d/init.sql